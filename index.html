'古巴比伦':'古巴比伦王国兴起于两河流域中南部，以巴比伦城为中心。汉谟拉比在位时完成区域统一，并以《汉谟拉比法典》闻名，体现了早期国家治理、法律书写和王权秩序。它承接苏美尔、阿卡德传统，是古代西亚城市文明的重要阶段。',

function renderSearchPanel(q){const panel=document.getElementById('searchPanel');if(!q){panel.classList.remove('open');panel.innerHTML='';return}const civs=allSegments().filter(s=>matchText(q,s.label,s.civ,segLabel(s.label),civName(s.civ))).slice(0,10);const figs=figures.filter(f=>matchText(q,f.name,f.aliases,f.segmentLabel,figureDisplayName(f),segLabel(f.segmentLabel))).slice(0,10);searchResults=[...civs.map(x=>({type:'civ',data:x})),...figs.map(x=>({type:'figure',data:x}))];if(!searchResults.length){panel.classList.add('open');panel.innerHTML=`<div class="empty">${currentLang==='en'?'No civilizations or historical figures found.':'没有找到文明或历史人物。'}</div>`;return}let html='';if(civs.length){html+=`<div class="resultGroup">${currentLang==='en'?'Civilizations':'文明'}</div>`+civs.map((r,i)=>`<div class="resultItem" onclick="selectSearchResult(${i})"><b>${segLabel(r.label)}</b><span>${civName(r.civ)} · ${dateRangeText(r.start,r.end)}</span></div>`).join('')}if(figs.length){const offset=civs.length;html+=`<div class="resultGroup">${currentLang==='en'?'Historical Figures':'历史人物'}</div>`+figs.map((r,i)=>`<div class="resultItem" onclick="selectSearchResult(${offset+i})"><b>${figureDisplayName(r)}</b><span>${segLabel(r.segmentLabel)} · ${currentLang==='en'?'Born in':'出生于'}${r.birthplace} · ${dateRangeText(r.start,r.end)}</span></div>`).join('')}panel.classList.add('open');panel.innerHTML=html}
function selectSearchResult(i){const r=searchResults[i];document.getElementById('searchPanel').classList.remove('open');if(!r)return;if(r.type==='civ')showCivilizationDetail(r.data);else showFigureDetail(r.data)}
document.getElementById('search').addEventListener('input',e=>{searchTerm=e.target.value.trim();activeSegmentLabel=null;renderSearchPanel(searchTerm);renderBlocks();const exact=figures.find(f=>searchTerm&&(f.name===searchTerm||f.aliases?.includes(searchTerm)));if(exact)showFigureDetail(exact)});

function L(zh,en){return currentLang==='en'?en:zh}
function segLabel(label){return currentLang==='en'?(segmentEn[label]||label):label}
function civName(name){return currentLang==='en'?({'中华文明':'Chinese Civilization','日本与朝鲜':'Japan and Korea','罗马与地中海':'Rome and the Mediterranean','两河波斯与伊斯兰':'Mesopotamia, Persia and Islam','南亚文明':'South Asian Civilization','内亚草原':'Inner Asian Steppe','欧洲中世纪与近代':'Medieval and Early Modern Europe','非洲文明':'African Civilizations','美洲文明':'American Civilizations','东南亚文明':'Southeast Asian Civilizations'}[name]||name):name}
function cleanDate(y){return currentLang==='en'?fmt(y):fmt(y).replace('前后','')}
function dateRangeText(a,b){return `${cleanDate(a)} ${currentLang==='en'?'to':'至'} ${cleanDate(b)}`}
